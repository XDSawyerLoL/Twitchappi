<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Swapp — découvre les lives qu’on ne te montre pas</title>
<link rel="icon" href="favicon.ico" />
<style>
:root{
  --bg:#05070d;--bg2:#09101d;--surface:#0e1625;--surface2:#131d30;--line:#263348;
  --text:#f7f9ff;--muted:#9dacbf;--soft:#dbe7fb;--brand:#a855f7;--cyan:#22d3ee;--green:#22c55e;--red:#fb4565;--amber:#f59e0b;
  --radius:22px;--shadow:0 24px 70px rgba(0,0,0,.34);--pad:clamp(18px,3.2vw,56px);
}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}body{overflow-x:hidden}button,input,textarea,select{font:inherit}button{cursor:pointer}a{color:inherit}.hidden{display:none!important}.muted{color:var(--muted)}.small{font-size:13px;color:var(--muted)}
.top{position:sticky;top:0;z-index:50;background:rgba(5,7,13,.92);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.08)}
.topbar{height:72px;display:flex;align-items:center;gap:14px;padding:0 clamp(14px,2.2vw,34px)}.brand{border:0;background:transparent;color:white;padding:0}.brand{display:flex;align-items:center;gap:11px;font-weight:1000;letter-spacing:-.04em;white-space:nowrap}.brandMark,.avatarMini{background:linear-gradient(135deg,var(--cyan),var(--brand));box-shadow:0 0 38px rgba(34,211,238,.22)}.brandMark{width:42px;height:42px;border-radius:16px}.brand span{font-size:18px}.mainNav{display:flex;gap:6px;align-items:center;flex:1;overflow:auto;scrollbar-width:none}.mainNav::-webkit-scrollbar{display:none}.navBtn{border:0;background:transparent;color:#dce7f6;padding:10px 14px;border-radius:999px;font-weight:900;white-space:nowrap}.navBtn:hover,.navBtn.active{background:rgba(255,255,255,.10);color:#fff}.userArea{position:relative}.userBtn{border:1px solid var(--line);background:rgba(255,255,255,.06);color:white;border-radius:999px;padding:7px 11px;display:flex;align-items:center;gap:8px;font-weight:950}.avatarMini{width:28px;height:28px;border-radius:50%;object-fit:cover}.menu{display:none;position:absolute;right:0;top:50px;width:min(340px,calc(100vw - 24px));background:#0e1625;border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);padding:10px}.menu.open{display:block}.menu button{width:100%;border:0;background:transparent;color:white;text-align:left;border-radius:14px;padding:11px 12px;font-weight:850}.menu button:hover{background:rgba(255,255,255,.08)}.sep{height:1px;background:var(--line);margin:8px 0}.mobileNav{display:none;position:fixed;left:10px;right:10px;bottom:10px;z-index:60;border:1px solid rgba(255,255,255,.12);background:rgba(10,15,25,.94);backdrop-filter:blur(16px);border-radius:24px;padding:7px;box-shadow:var(--shadow);grid-template-columns:repeat(5,1fr);gap:4px}.mobileNav button{border:0;background:transparent;color:#d9e5f6;border-radius:18px;padding:9px 5px;font-size:12px;font-weight:900}.mobileNav button.active{background:rgba(255,255,255,.12);color:white}
.app{width:100%;min-height:calc(100svh - 72px);margin:0;padding:0}.view{display:none;width:100%;animation:fade .16s ease-out}.view.active{display:block}@keyframes fade{from{opacity:.6;transform:translateY(4px)}to{opacity:1;transform:none}}
.section{padding:0 var(--pad);margin-top:28px}.page{padding:clamp(22px,3vw,44px) var(--pad) 110px;background:radial-gradient(circle at 5% 0%,rgba(34,211,238,.14),transparent 30%),radial-gradient(circle at 85% 0%,rgba(168,85,247,.16),transparent 35%),var(--bg)}.pageHead{display:flex;justify-content:space-between;align-items:flex-start;gap:18px;margin-bottom:18px}.pageHead h1{font-size:clamp(34px,4.8vw,74px);line-height:.92;letter-spacing:-.07em;margin:0}.pageHead p{margin:8px 0 0;max-width:760px;color:var(--muted);line-height:1.45}.panel,.card{border:1px solid rgba(255,255,255,.11);background:linear-gradient(180deg,rgba(255,255,255,.065),rgba(255,255,255,.03));border-radius:var(--radius);box-shadow:var(--shadow)}.panel{padding:18px}.card{padding:16px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(245px,1fr));gap:14px}.two{display:grid;grid-template-columns:1fr 1fr;gap:16px}.three{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.btn{border:0;border-radius:14px;background:linear-gradient(135deg,var(--brand),#c044ff);color:white;padding:12px 16px;font-weight:950;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:8px}.btn.secondary{background:rgba(255,255,255,.08);border:1px solid var(--line)}.btn.ghost{background:transparent;border:1px solid var(--line)}.btn.good{background:linear-gradient(135deg,#10b981,#22c55e)}.btn.bad{background:linear-gradient(135deg,#ef4444,#fb7185)}input,textarea,select{width:100%;border:1px solid var(--line);background:#09111f;color:white;border-radius:14px;padding:12px 13px;outline:none}textarea{min-height:96px;resize:vertical}label{display:grid;gap:7px;font-size:13px;color:#dce7f5;font-weight:850}.formGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.formGrid .wide{grid-column:1/-1}.pill{display:inline-flex;align-items:center;gap:6px;border:1px solid rgba(255,255,255,.13);background:rgba(255,255,255,.07);border-radius:999px;padding:6px 10px;font-size:12px;font-weight:950}.dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block}.empty{border:1px dashed rgba(255,255,255,.18);background:rgba(255,255,255,.035);border-radius:18px;padding:20px;color:var(--muted)}
.hero{min-height:calc(100svh - 72px);display:grid;grid-template-columns:minmax(320px,.9fr) minmax(360px,1.1fr);align-items:center;gap:clamp(24px,4vw,72px);padding:clamp(36px,5vw,86px) var(--pad);background:radial-gradient(circle at 0 0,rgba(34,211,238,.17),transparent 32%),radial-gradient(circle at 82% 0,rgba(168,85,247,.18),transparent 36%),linear-gradient(135deg,#031018 0%,#070813 48%,#0d0a1d 100%)}.eyebrow{display:inline-flex;align-items:center;gap:8px;border:1px solid rgba(168,85,247,.58);background:rgba(168,85,247,.15);border-radius:999px;padding:7px 11px;font-size:12px;font-weight:1000}.hero h1{font-size:clamp(58px,8vw,132px);line-height:.84;letter-spacing:-.085em;margin:18px 0}.lead{font-size:clamp(17px,1.45vw,24px);line-height:1.42;color:#dce9fb;max-width:760px}.moodRail{display:flex;gap:8px;flex-wrap:wrap;margin:20px 0}.moodRail button{border:1px solid rgba(255,255,255,.13);background:rgba(255,255,255,.07);color:white;border-radius:999px;padding:8px 11px;font-size:13px;font-weight:900}.heroWall{display:grid;grid-template-columns:1fr 1fr;gap:14px;min-width:0}.heroWall .liveCard:first-child{grid-column:1/-1}.homeBand{padding:28px var(--pad);display:grid;grid-template-columns:1fr auto;gap:20px;align-items:center;background:linear-gradient(135deg,rgba(168,85,247,.18),rgba(34,211,238,.08));border-top:1px solid rgba(255,255,255,.09);border-bottom:1px solid rgba(255,255,255,.09)}.homeBand h2{font-size:clamp(28px,3vw,48px);letter-spacing:-.05em;margin:0 0 6px}.homeBand p{margin:0;color:#cbd8ec}.liveCard{min-width:0;overflow:hidden;border:1px solid rgba(255,255,255,.11);background:rgba(255,255,255,.045);border-radius:22px;box-shadow:0 18px 42px rgba(0,0,0,.22)}.liveCard:hover{border-color:rgba(34,211,238,.42)}.thumb{aspect-ratio:16/9;background:#02050b;overflow:hidden}.thumb img{width:100%;height:100%;object-fit:cover;display:block}.thumbFallback{height:100%;display:grid;place-items:center;color:#7b8ca4;background:linear-gradient(135deg,rgba(34,211,238,.08),rgba(168,85,247,.11))}.liveBody{padding:14px}.liveTitle{font-size:16px;line-height:1.2;font-weight:1000;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:38px}.desc{font-size:13px;color:var(--muted);line-height:1.35;margin-top:7px}.searchLine{display:grid;grid-template-columns:minmax(0,1fr) 170px 150px auto;gap:10px}.categoryCard{border:1px solid rgba(255,255,255,.11);background:rgba(255,255,255,.045);border-radius:20px;overflow:hidden;text-align:left;color:white}.categoryCard img{width:100%;aspect-ratio:3/4;object-fit:cover;background:#08101d}.categoryCard b{display:block;padding:12px 12px 4px}.categoryCard span{display:block;padding:0 12px 12px}.teamCard .members{display:flex;gap:6px;flex-wrap:wrap}.watchLayout{display:grid;grid-template-columns:minmax(0,1fr) minmax(320px,420px);gap:16px}.player{border:1px solid rgba(255,255,255,.11);border-radius:24px;overflow:hidden;background:#000;aspect-ratio:16/9}.player iframe,.player video{width:100%;height:100%;border:0;display:block}.chatBox{height:520px;display:flex;flex-direction:column;overflow:hidden}.chatLog{flex:1;overflow:auto;padding:12px;display:grid;gap:8px;align-content:start}.chatMsg{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.10);border-radius:14px;padding:9px}.chatForm{border-top:1px solid var(--line);display:grid;grid-template-columns:1fr auto;gap:8px;padding:10px}.profileTop{display:grid;grid-template-columns:130px 1fr auto;gap:18px;align-items:end}.banner{height:260px;border-radius:28px;border:1px solid rgba(255,255,255,.10);background:linear-gradient(135deg,rgba(168,85,247,.36),rgba(34,211,238,.18)),#0d1626;overflow:hidden}.banner img{width:100%;height:100%;object-fit:cover}.avatar{width:130px;height:130px;border-radius:32px;border:5px solid var(--bg);background:linear-gradient(135deg,var(--brand),var(--cyan));object-fit:cover;margin-top:-66px}.stat{border:1px solid rgba(255,255,255,.11);background:rgba(255,255,255,.045);border-radius:20px;padding:16px}.stat b{font-size:32px;display:block}.tasks{display:grid;gap:10px}.task{display:flex;justify-content:space-between;gap:14px;align-items:center;border:1px solid rgba(255,255,255,.11);background:rgba(255,255,255,.045);border-radius:16px;padding:13px}.ok{color:#86efac}.no{color:#fda4af}.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);z-index:100;opacity:0;pointer-events:none;background:#101827;border:1px solid var(--line);color:white;border-radius:16px;padding:12px 15px;box-shadow:var(--shadow);font-weight:850;max-width:min(560px,calc(100vw - 28px))}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}.statusLine{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:13px}.loader{width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,.25);border-top-color:white;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.splitTabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}.splitTabs button{border:1px solid var(--line);background:rgba(255,255,255,.06);color:white;border-radius:999px;padding:9px 12px;font-weight:900}.splitTabs button.active{background:rgba(168,85,247,.25);border-color:rgba(168,85,247,.65)}
@media(max-width:1100px){.hero,.two,.watchLayout{grid-template-columns:1fr}.heroWall{grid-template-columns:1fr 1fr}.profileTop{grid-template-columns:100px 1fr}.profileTop .row{grid-column:1/-1}.avatar{width:100px;height:100px;border-radius:26px}.banner{height:210px}.searchLine{grid-template-columns:1fr 1fr}.searchLine .btn{grid-column:1/-1}.three{grid-template-columns:1fr}.homeBand{grid-template-columns:1fr}}
@media(max-width:760px){.mainNav{display:none}.mobileNav{display:grid}.topbar{height:64px}.app{min-height:calc(100svh - 64px)}.hero{min-height:calc(100svh - 64px);padding:28px 16px 92px}.heroWall{grid-template-columns:1fr}.page{padding:24px 16px 96px}.section{padding:0 16px}.formGrid,.searchLine{grid-template-columns:1fr}.pageHead{display:grid}.hero h1{font-size:clamp(50px,17vw,82px)}.grid{grid-template-columns:1fr}.chatBox{height:390px}.homeBand{padding:22px 16px 96px}.userLabelText{display:none}}
</style>
</head>
<body>
<header class="top">
  <div class="topbar">
    <button class="brand" data-view="home" type="button" aria-label="Accueil Swapp"><span class="brandMark"></span><span>Swapp</span></button>
    <nav id="nav" class="mainNav" aria-label="Navigation principale"></nav>
    <div class="userArea">
      <button id="userBtn" class="userBtn" type="button"><img id="userAvatar" class="avatarMini" alt=""><span id="userLabel" class="userLabelText">Connexion</span></button>
      <div id="userMenu" class="menu"></div>
    </div>
  </div>
</header>
<main class="app" id="app">
  <section id="home" class="view active"></section>
  <section id="discover" class="view"></section>
  <section id="categories" class="view"></section>
  <section id="teams" class="view"></section>
  <section id="channel" class="view"></section>
  <section id="manager" class="view"></section>
  <section id="dashboard" class="view"></section>
  <section id="studio" class="view"></section>
  <section id="settings" class="view"></section>
  <section id="watch" class="view"></section>
  <section id="admin" class="view"></section>
</main>
<nav id="mobileNav" class="mobileNav" aria-label="Navigation mobile"></nav>
<div id="toast" class="toast"></div>
<script src="index_script.js" defer></script>
</body>
</html>
