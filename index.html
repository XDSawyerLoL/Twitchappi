ont-size:30px}.dashGrid{display:grid;grid-template-columns:1.35fr .85fr;gap:16px}.chart{height:250px;display:flex;align-items:end;gap:8px;border:1px solid var(--line);border-radius:18px;background:rgba(255,255,255,.035);padding:16px}.bar{flex:1;min-width:8px;border-radius:10px 10px 3px 3px;background:linear-gradient(180deg,var(--cyan),var(--brand));position:relative}.bar span{position:absolute;bottom:-22px;left:50%;transform:translateX(-50%);font-size:10px;color:var(--muted)}.progress{height:12px;background:#0b101c;border:1px solid var(--line);border-radius:999px;overflow:hidden}.progress>i{display:block;height:100%;background:linear-gradient(90deg,var(--brand),var(--cyan));width:0}.sideLayout{display:grid;grid-template-columns:260px minmax(0,1fr);gap:16px}.side{border:1px solid var(--line);background:rgba(255,255,255,.035);border-radius:18px;padding:8px;height:max-content}.side button{width:100%;border:0;background:transparent;color:#edf2ff;border-radius:12px;padding:12px;text-align:left;font-weight:850}.side button:hover,.side button.active{background:rgba(139,92,246,.16)}.settingSection{display:none}.settingSection.active{display:block}.notice{max-width:760px;margin:24px auto}.marquee{display:flex;gap:12px;overflow:auto;padding-bottom:10px}.marquee .liveCard{min-width:260px;max-width:260px}.toast{position:fixed;right:20px;bottom:20px;background:#151b28;border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:12px 14px;display:none;z-index:99}.toast.show{display:block}.mobileNav{display:none}.badgeAdmin{background:rgba(245,158,11,.14);border-color:rgba(245,158,11,.45);color:#fde68a}@media(max-width:1080px){.heroGrid,.watchShell,.dashGrid,.two,.three,.four,.sideLayout,.searchLine{grid-template-columns:1fr}.player,.chatPanel{height:430px;min-height:430px;resize:none;max-width:none}.app{padding:16px 16px 84px}.channelMeta{grid-template-columns:84px 1fr}.avatar{width:84px;height:84px}.mainNav{display:none}.mobileNav{display:flex;position:fixed; /* Oryon UX polish — stream manager, premium player and featured rail */
.featuredLive{position:relative;border:1px solid var(--line);border-radius:28px;min-height:360px;overflow:hidden;background:#070a11;box-shadow:var(--shadow)}
.featuredLive::before{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(8,11,18,.95),rgba(8,11,18,.40) 48%,rgba(8,11,18,.82)),var(--bgImg,none);background-size:cover;background-position:center;filter:saturate(1.05)}
.featuredLiveInner{position:relative;z-index:1;display:grid;grid-template-columns:minmax(0,1fr) minmax(340px,520px);gap:24px;align-items:center;padding:26px;min-height:360px}
.featuredCopy h2{font-size:42px;letter-spacing:-.055em;margin:8px 0}.featuredCopy p{max-width:660px;color:#dbe7ff}.featuredStack{display:flex;align-items:center;justify-content:center;min-height:280px;perspective:900px;overflow:hidden}
.featuredCard{position:absolute;width:min(430px,30vw);min-width:270px;border:1px solid rgba(255,255,255,.16);background:#0b101c;border-radius:22px;overflow:hidden;box-shadow:0 24px 70px rgba(0,0,0,.45);transition:transform .2s,opacity .2s}.featuredCard img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block}.featuredCard .liveBody{background:rgba(9,13,22,.92)}
.featuredCard.main{position:relative;width:min(520px,35vw);min-width:330px;z-index:4;transform:translateX(0) scale(1)}.featuredCard.left{z-index:2;transform:translateX(-52%) scale(.78) rotateY(13deg);opacity:.55}.featuredCard.right{z-index:2;transform:translateX(52%) scale(.78) rotateY(-13deg);opacity:.55}.featuredCard.far{z-index:1;transform:translateX(0) scale(.62);opacity:.22}
.premiumPlayer{aspect-ratio:16/9;height:auto!important;min-height:0!important;width:100%;border-radius:24px}.premiumPlayer video,.premiumPlayer iframe{aspect-ratio:16/9;object-fit:cover}.channelWatch{grid-template-columns:minmax(0,1fr) minmax(360px,430px)}.channelWatch .chatPanel{height:auto;min-height:0;aspect-ratio:auto}.qualityBar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:10px;color:var(--muted)}.qualityBar .pill{border-color:rgba(34,211,238,.38);background:rgba(34,211,238,.08)}
.offlinePoster{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.8}.offlineOverlay{position:relative;z-index:2;background:linear-gradient(180deg,rgba(3,5,8,.20),rgba(3,5,8,.78));height:100%;display:grid;place-items:center;text-align:center;padding:30px}.emptyStatePlayer{position:relative;height:100%}
.managerHero{display:grid;grid-template-columns:minmax(0,1.35fr) minmax(360px,.65fr);gap:16px;align-items:start}.managerPreview .premiumPlayer{background:#030508}.obsSteps{display:grid;gap:10px}.obsSteps .summaryItem b{display:block;color:#eaf2ff}.copyLine{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center}.categoryCard img{aspect-ratio:3/4!important}.grid.smallCards{grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:14px}.categoryCard b{font-size:15px}.categoryCard span{font-size:12px}
@media(max-width:1080px){.featuredLiveInner,.managerHero,.channelWatch{grid-template-columns:1fr}.featuredStack{display:none}.premiumPlayer{aspect-ratio:16/9}.channelWatch .chatPanel{height:430px}.featuredCopy h2{font-size:34px}}

  <section id="twitch" class="view"></section>
  <section id="categories" class="view"></section>
  <section id="teams" class="view"></section>

  <section id="manager" class="view"></section>
<section id="studio" class="view"></section>
