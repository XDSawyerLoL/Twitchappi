# Exemple Nginx reverse proxy pour masquer PeerTube derrière video.oryon.fr
# À adapter avec Certbot/Let's Encrypt sur le VPS.

server {
    listen 80;
    server_name video.oryon.fr;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name video.oryon.fr;

    ssl_certificate /etc/letsencrypt/live/video.oryon.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/video.oryon.fr/privkey.pem;

    client_max_body_size 8G;

    location / {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }
}
