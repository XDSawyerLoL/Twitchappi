services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./storage/postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - ./storage/redis:/data

  peertube:
    image: chocobozzz/peertube:production-bullseye
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    ports:
      - "127.0.0.1:9000:9000"
      - "1935:1935"
    environment:
      PEERTUBE_WEBSERVER_HOSTNAME: ${PEERTUBE_WEBSERVER_HOSTNAME}
      PEERTUBE_WEBSERVER_PORT: ${PEERTUBE_WEBSERVER_PORT}
      PEERTUBE_WEBSERVER_HTTPS: ${PEERTUBE_WEBSERVER_HTTPS}
      PEERTUBE_DB_HOSTNAME: postgres
      PEERTUBE_DB_USERNAME: ${POSTGRES_USER}
      PEERTUBE_DB_PASSWORD: ${POSTGRES_PASSWORD}
      PEERTUBE_DB_DATABASE: ${POSTGRES_DB}
      PEERTUBE_REDIS_HOSTNAME: redis
      PEERTUBE_REDIS_AUTH: ${REDIS_PASSWORD}
      PEERTUBE_ADMIN_EMAIL: ${PEERTUBE_ADMIN_EMAIL}
      PEERTUBE_SMTP_HOSTNAME: ${PEERTUBE_SMTP_HOSTNAME}
      PEERTUBE_SMTP_PORT: ${PEERTUBE_SMTP_PORT}
      PEERTUBE_SMTP_USERNAME: ${PEERTUBE_SMTP_USERNAME}
      PEERTUBE_SMTP_PASSWORD: ${PEERTUBE_SMTP_PASSWORD}
      PEERTUBE_SMTP_FROM: ${PEERTUBE_SMTP_FROM}
      # Réglages live conseillés pour démarrer
      PEERTUBE_LIVE_ENABLED: "true"
      PEERTUBE_LIVE_ALLOW_REPLAY: "false"
      PEERTUBE_TRANSCODING_ENABLED: "true"
      PEERTUBE_TRANSCODING_RESOLUTIONS_1080P: "true"
      PEERTUBE_TRANSCODING_RESOLUTIONS_720P: "true"
      PEERTUBE_TRANSCODING_RESOLUTIONS_480P: "true"
    volumes:
      - ./storage/peertube/data:/data
      - ./storage/peertube/config:/config
